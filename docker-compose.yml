version: '3.8'

services:
  item-service:  # This is the service name in Docker network
    build: ./itemservice  # This points to your folder
    container_name: item-service
    ports:
      - "8081:8081"
    networks:
      - microservices-net

  order-service:
    build: ./orderservice
    container_name: order-service
    ports:
      - "8082:8082"
    networks:
      - microservices-net

  payment-service:
    build: ./paymentservice
    container_name: payment-service
    ports:
      - "8083:8083"
    networks:
      - microservices-net

  api-gateway:
    build: ./apigateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - item-service
      - order-service
      - payment-service
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge